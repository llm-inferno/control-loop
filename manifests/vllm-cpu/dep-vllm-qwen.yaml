apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen-server
  namespace: infer
  labels:
    inferno.server.managed: "true"
    inferno.server.name: vllm-qwen
    inferno.server.model: qwen_0_5b
    inferno.server.class: Bronze
    inferno.server.allocation.accelerator: cpu
    inferno.server.allocation.maxbatchsize: "8"
    inferno.server.allocation.maxqueuesize: "16"
    inferno.server.evaluator: "vllm-server"
    inferno.server.vllm-deployment: "vllm-qwen-cpu"
    inferno.server.load.rpm: "30"
    inferno.server.load.intokens: "64"
    inferno.server.load.outtokens: "32"
    inferno.server.load.nominal.rpm: "30"
    inferno.server.load.nominal.intokens: "64"
    inferno.server.load.nominal.outtokens: "32"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen-server
  template:
    metadata:
      labels:
        app: vllm-qwen-server
        inferno.server.vllm-deployment: "vllm-qwen-cpu"
    spec:
      serviceAccountName: vllm-server-evaluator
      containers:
        - name: server-sim
          image: quay.io/atantawi/inferno-server-sim:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: EVALUATOR_URL
              value: "http://localhost:8081"
            - name: NOISE_ENABLED
              value: "false"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
        - name: evaluator
          image: quay.io/atantawi/inferno-evaluator:latest
          imagePullPolicy: Never
          args: ["vllm-server"]
          ports:
            - containerPort: 8081
          env:
            - name: EVALUATOR_PORT
              value: "8081"
            - name: VLLM_EVAL_CONFIG_FILE
              value: "/app/config/vllm-eval-config.json"
            - name: POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef: { fieldPath: metadata.namespace }
            - name: VLLM_NAMESPACE
              value: "infer"
          volumeMounts:
            - name: vllm-server-config
              mountPath: /app/config
            - name: podinfo
              mountPath: /etc/podinfo
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
      volumes:
        - name: vllm-server-config
          configMap:
            name: vllm-server-eval-config
        - name: podinfo
          downwardAPI:
            items:
              - path: pair-id
                fieldRef:
                  fieldPath: "metadata.labels['inferno.server.pair-id']"
              - path: vllm-deployment
                fieldRef:
                  fieldPath: "metadata.labels['inferno.server.vllm-deployment']"
