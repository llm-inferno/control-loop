apiVersion: apps/v1
kind: Deployment
metadata:
  name: blis-granite-8b
  namespace: infer
  labels:
    inferno.server.managed: "true"
    inferno.server.name: blis-granite
    inferno.server.model: granite_8b
    inferno.server.class: Premium
    inferno.server.allocation.accelerator: H100
    inferno.server.allocation.maxbatchsize: "256"
    inferno.server.load.rpm: "15"
    inferno.server.load.intokens: "1024"
    inferno.server.load.outtokens: "256"
    inferno.server.load.nominal.rpm: "15"
    inferno.server.load.nominal.intokens: "1024"
    inferno.server.load.nominal.outtokens: "256"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blis-granite
  template:
    metadata:
      labels:
        app: blis-granite
        inferno.server.model: granite_8b
        inferno.server.allocation.accelerator: H100
        inferno.server.allocation.maxbatchsize: "256"
    spec:
      containers:
      - name: server-sim
        image: quay.io/atantawi/inferno-server-sim:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: EVALUATOR_URL
          value: "http://localhost:8081"
        - name: SERVERSIM_CONTINUOUS
          value: "true"
        - name: SERVERSIM_SATURATION_POLICY
          value: "retry-at-lower-load"
        volumeMounts:
        - name: podinfo
          mountPath: /etc/podinfo
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      - name: evaluator
        image: quay.io/atantawi/inferno-evaluator:latest
        imagePullPolicy: IfNotPresent
        args: ["blis"]
        ports:
        - containerPort: 8081
        env:
        - name: BLIS_CONFIG_FILE
          value: "/app/config/blis-config.json"
        - name: HW_CONFIG_FILE
          value: "/app/config/hardware_config.json"
        - name: LATENCY_BACKEND
          value: "trained-physics"
        volumeMounts:
        - name: blis-config
          mountPath: /app/config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: blis-config
        configMap:
          name: server-sim-blis-small
      - name: podinfo
        downwardAPI:
          items:
          - path: labels
            fieldRef:
              fieldPath: metadata.labels
