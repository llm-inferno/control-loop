apiVersion: v1
kind: ConfigMap
metadata:
  name: server-sim-blis-small
  namespace: infer
data:
  # blis-config.json: one entry per (model, accelerator) pair.
  # "model" must match the inferno.server.model deployment label.
  # "hfConfigPath" references a flat filename under the configmap mount (/app/config).
  #
  # betaCoeffs/alphaCoeffs: trained-physics recommended values (hardware-independent).
  #   trained-physics backend (dep-blis-granite, dep-blis-llama) requires all entries
  #   to carry ≥7 betaCoeffs at startup — hence all entries are populated uniformly.
  #
  #   betaCoeffs (10-term): β₁ₐ=0.15, β₂ₐ=0.0, β₃=1.4, β₄=0.75, β₅=32µs/layer,
  #                          β₆=4µs/req, β₇=126µs/step, β₈=482µs/MoE-layer,
  #                          β₁ᵦ=0.0, β₂ᵦ=1.9
  #   alphaCoeffs (3-term): α₀=15563µs (API overhead), α₁=777µs (post-decode),
  #                          α₂=46µs/token (output token processing)
  blis-config.json: |
    {
      "models": [
        {
          "accelerator": "H100",
          "model": "granite_8b",
          "hfConfigPath": "/app/config/granite-3.1-8b-instruct.json",
          "gpu": "H100",
          "tp": 1,
          "totalKVBlocks": 23257,
          "blockSizeTokens": 16,
          "maxRunningReqs": 256,
          "maxScheduledTokens": 8192,
          "maxModelLen": 0,
          "scheduler": "fcfs",
          "betaCoeffs": [0.15, 0.0, 1.4, 0.75, 32.0, 4.0, 126.0, 482.0, 0.0, 1.9],
          "alphaCoeffs": [15563.0, 777.0, 46.0],
          "simulationHorizon": 300000000,
          "numRequests": 0,
          "seed": 42
        },
        {
          "accelerator": "A100",
          "model": "granite_8b",
          "hfConfigPath": "/app/config/granite-3.1-8b-instruct.json",
          "gpu": "A100-80",
          "tp": 1,
          "totalKVBlocks": 23257,
          "blockSizeTokens": 16,
          "maxRunningReqs": 256,
          "maxScheduledTokens": 8192,
          "maxModelLen": 0,
          "scheduler": "fcfs",
          "betaCoeffs": [0.15, 0.0, 1.4, 0.75, 32.0, 4.0, 126.0, 482.0, 0.0, 1.9],
          "alphaCoeffs": [15563.0, 777.0, 46.0],
          "simulationHorizon": 300000000,
          "numRequests": 0,
          "seed": 42
        },
        {
          "accelerator": "H100",
          "model": "llama_13b",
          "hfConfigPath": "/app/config/Llama-2-13b-hf.json",
          "gpu": "H100",
          "tp": 1,
          "totalKVBlocks": 14336,
          "blockSizeTokens": 16,
          "maxRunningReqs": 256,
          "maxScheduledTokens": 8192,
          "maxModelLen": 0,
          "scheduler": "fcfs",
          "betaCoeffs": [0.15, 0.0, 1.4, 0.75, 32.0, 4.0, 126.0, 482.0, 0.0, 1.9],
          "alphaCoeffs": [15563.0, 777.0, 46.0],
          "simulationHorizon": 300000000,
          "numRequests": 0,
          "seed": 42
        }
      ]
    }

  # hardware_config.json: GPU specs used by the blis trained-physics latency backend.
  # "gpu" in blis-config.json must match a key here.
  hardware_config.json: |
    {
      "H100": {
        "TFlopsPeak":  989.5,
        "TFlopsFP8":   1979.0,
        "BwPeakTBs":   3.35,
        "mfuPrefill":  0.45,
        "mfuDecode":   0.30,
        "MemoryGiB":   80.0
      },
      "A100-80": {
        "TFlopsPeak":  312,
        "TFlopsFP8":   0,
        "BwPeakTBs":   2.039,
        "mfuPrefill":  0.38,
        "mfuDecode":   0.18,
        "MemoryGiB":   80.0
      }
    }

  # HuggingFace model configs referenced by hfConfigPath above.
  granite-3.1-8b-instruct.json: |
    {
      "architectures": ["GraniteForCausalLM"],
      "attention_bias": false,
      "attention_dropout": 0.1,
      "attention_multiplier": 0.0078125,
      "bos_token_id": 0,
      "embedding_multiplier": 12.0,
      "eos_token_id": 0,
      "hidden_act": "silu",
      "hidden_size": 4096,
      "initializer_range": 0.02,
      "intermediate_size": 12800,
      "logits_scaling": 16.0,
      "max_position_embeddings": 131072,
      "mlp_bias": false,
      "model_type": "granite",
      "num_attention_heads": 32,
      "num_hidden_layers": 40,
      "num_key_value_heads": 8,
      "pad_token_id": 0,
      "residual_multiplier": 0.22,
      "rms_norm_eps": 1e-05,
      "rope_scaling": null,
      "rope_theta": 10000000.0,
      "tie_word_embeddings": true,
      "torch_dtype": "bfloat16",
      "transformers_version": "4.47.0",
      "use_cache": true,
      "vocab_size": 49155
    }

  Llama-2-13b-hf.json: |
    {
      "architectures": ["LlamaForCausalLM"],
      "bos_token_id": 1,
      "eos_token_id": 2,
      "hidden_act": "silu",
      "hidden_size": 5120,
      "initializer_range": 0.02,
      "intermediate_size": 13824,
      "max_position_embeddings": 4096,
      "model_type": "llama",
      "num_attention_heads": 40,
      "num_hidden_layers": 40,
      "num_key_value_heads": 40,
      "pretraining_tp": 1,
      "rms_norm_eps": 1e-05,
      "rope_scaling": null,
      "tie_word_embeddings": false,
      "torch_dtype": "float16",
      "transformers_version": "4.33.0.dev0",
      "use_cache": true,
      "vocab_size": 32000
    }

