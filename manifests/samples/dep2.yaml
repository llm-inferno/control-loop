apiVersion: apps/v1
kind: Deployment
metadata:
  name: bronze-granite-13b
  namespace: infer
  labels:
    inferno.server.managed: "true"
    inferno.server.name: vllm-002
    inferno.server.model: granite_13b
    inferno.server.class: Bronze
    inferno.server.allocation.accelerator: H100
    inferno.server.allocation.maxbatchsize: "16"
    inferno.server.load.rpm: "60"
    inferno.server.load.intokens: "512"
    inferno.server.load.outtokens: "512"
    inferno.server.load.nominal.rpm: "60"
    inferno.server.load.nominal.intokens: "512"
    inferno.server.load.nominal.outtokens: "512"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vllm-002
  template:
    metadata:
      labels:
        app: vllm-002
    spec:
      containers:
      - name: server-sim
        image: quay.io/atantawi/inferno-server-sim:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: EVALUATOR_URL
          value: "http://localhost:8081"
        - name: NOISE_ENABLED
          value: "true"
        - name: NOISE_STD_FRACTION
          value: "0.01"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      - name: evaluator
        image: quay.io/atantawi/inferno-evaluator:latest
        imagePullPolicy: IfNotPresent
        args: ["queue-analysis"]
        ports:
        - containerPort: 8081
        env:
        - name: MODEL_DATA_FILE
          value: "/etc/config/model-data.json"
        volumeMounts:
        - name: model-data
          mountPath: /etc/config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: model-data
        configMap:
          name: server-sim-model-data
