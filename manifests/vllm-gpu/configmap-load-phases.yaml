apiVersion: v1
kind: ConfigMap
metadata:
  name: load-phases-config
  namespace: inferno-system
data:
  phases.yaml: |
    # run17 concurrency A/B — run15-style 5x RAMP profile (single model: qwen, 1024/512).
    #
    # Why a ramp, not run16's step surge: run16 was a structural null. On real vLLM,
    # continuous batching is throughput-bound, so the per-replica operating concurrency
    # (~40-64) never reaches a high cap — a searched M*~60 and a pinned 128 are
    # indistinguishable (the --max-num-seqs 128 server cap never engages in either arm).
    # The signal requires a cap that BINDS BELOW the operating point. run17 therefore
    # adds a low-pin arm (B-low, fixed M*=32 via DEFAULT_MAX_BATCH_SIZE), sized to the
    # baseline operating point (run16 measured ~conc 32-40 at 250 RPM) — the value a
    # latency-conscious admin picks to keep ITL under the 20ms SLO. A sustained 5x load
    # then exposes that static choice: ITL stays good, but TTFT climbs and the optimizer
    # must over-provision replicas (possibly hitting the 8-H100 cap -> throughput
    # deficit). The adaptive search (A) serves the same load with fewer replicas.
    #
    # Three arms (selected per run via ARM_MAXBATCH in oc-deploy.sh):
    #   A      = search ON  (unset)  -> M* ~60
    #   B-low  = fixed M*=32 (binds below the ~64 knee -> over-provision)
    #   B-high = fixed M*=128 (control; expected to tie A on real throughput-bound vLLM)
    #
    # Real qwen curve (single H100, experiments/run16/preflight/curve-qwen-real.csv):
    # knee ~conc 64 / ~384 RPM / ITL ~20ms; soft (no KV cliff). Baseline 1x = 250 RPM is
    # below the knee so 1 replica is within SLO. The qwen deployment's nominal.rpm = 250
    # sets 1x; 5x = 1250 RPM.
    #
    # Sequence (30 min total): baseline 250 RPM (10m, steady 1 replica) -> ramp to
    # 5x=1250 RPM (6m) -> hold 1250 (6m: sustained overload, scale-out / over-provision)
    # -> ramp back to 250 (4m) -> hold (>=4m until teardown). 26 min active + final hold.
    #
    # Ratios are chained-multiplicative; hold phases use ratio: 1.0 and ramp phases
    # carry the multiplier change. The load emulator interpolates linearly within a
    # phase based on its ratio.
    phases:
      - duration: 10m
        ratio: 1.0       # baseline hold at 1x (250 RPM, below knee, 1 replica)
      - duration: 6m
        ratio: 5.0       # ramp 1x -> 5x (250 -> 1250 RPM)
      - duration: 6m
        ratio: 1.0       # hold at 5x (1250 RPM): sustained overload + scale-out
      - duration: 4m
        ratio: 0.2       # ramp 5x -> 1x (1250 -> 250 RPM)
      - duration: 0s     # hold at 1x forever (>=4 min until teardown)
