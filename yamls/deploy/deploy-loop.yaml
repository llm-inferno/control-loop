apiVersion: v1
kind: ServiceAccount
metadata:
  name: inferno
  namespace: inferno
---  
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inferno
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods/proxy"]
    verbs: ["get", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: inferno
subjects:
  - kind: ServiceAccount
    name: inferno
    namespace: inferno
roleRef:
  kind: ClusterRole
  name: inferno
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferno
  namespace: inferno
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inferno
  template:
    metadata:
      labels:
        app: inferno
    spec:
      serviceAccountName: inferno
      volumes:
      - name: all-data
        projected:
          sources:
          - configMap:
              name: inferno-static-data
          - configMap:
              name: inferno-dynamic-data
      - name: tuner-config
        configMap:
          name: model-tuner-config
      containers:
      - name: controller
        image: quay.io/atantawi/inferno-loop:latest
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: all-data
            mountPath: /etc/data
        env:
          - name: CONTROLLER_PORT
            value: "3300"
          - name: INFERNO_CONTROL_PERIOD
            value: "30"
          - name: INFERNO_CONTROL_DYNAMIC
            value: "false"
          - name: INFERNO_DATA_PATH
            value: "/etc/data/"
          - name: COLLECTOR_PORT
            value: "3301"
          - name: INFERNO_PORT
            value: "3302"
          - name: ACTUATOR_PORT
            value: "3303"
          - name: TUNER_HOST
            value: "localhost"
          - name: TUNER_PORT
            value: "3304"
          - name: INFERNO_WARM_UP_TIMEOUT
            value: "10"
          - name: DEFAULT_MAX_BATCH_SIZE
            value: "128"
        ports:
        - containerPort: 3300
        command: ["controller"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1"
      - name: collector
        image: quay.io/atantawi/inferno-loop:latest
        imagePullPolicy: IfNotPresent
        env:
          - name: COLLECTOR_PORT
            value: "3301"
          - name: KUBECONFIG
            value: ""
          - name: INFERNO_STARTUP_DELAY
            value: "20"
        ports:
        - containerPort: 3301
        command: ["collector"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1"
      - name: optimizer
        image: quay.io/atantawi/inferno-optimizer:latest
        imagePullPolicy: IfNotPresent
        env:
          - name: INFERNO_PORT
            value: "3302"
        ports:
        - containerPort: 3302
        command: ["optimizer"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1"
      - name: actuator
        image: quay.io/atantawi/inferno-loop:latest
        imagePullPolicy: IfNotPresent
        env:
          - name: ACTUATOR_PORT
            value: "3303"
          - name: KUBECONFIG
            value: ""
        ports:
        - containerPort: 3303
        command: ["actuator"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1"
      - name: tuner
        image: quay.io/atantawi/inferno-tuner:latest
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: tuner-config
            mountPath: /etc/tuner/config
        env:
          - name: TUNER_PORT
            value: "3304"
          - name: CONFIG_DATA_DIR
            value: "/etc/tuner/config"
          - name: TUNER_WARM_UP_CYCLES
            value: "3"
          - name: TUNER_INIT_OBS
            value: "3"
          - name: TUNER_INIT_HOLD_BACK
            value: "true"
          - name: TUNER_ESTIMATOR_MODE
            value: "sliding-window"
        ports:
        - containerPort: 3304
        command: ["/app/tuner"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: inferno
  namespace: inferno
spec:
  selector:
    app: inferno
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3300