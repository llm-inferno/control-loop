apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-llama-13b
  namespace: infer
  labels:
    inferno.server.managed: "true"
    inferno.server.name: qa-llama
    inferno.server.model: llama_13b
    inferno.server.class: Bronze
    inferno.server.allocation.accelerator: H100
    inferno.server.allocation.maxbatchsize: "256"
    inferno.server.load.rpm: "30"
    inferno.server.load.intokens: "768"
    inferno.server.load.outtokens: "768"
    inferno.server.load.nominal.rpm: "30"
    inferno.server.load.nominal.intokens: "768"
    inferno.server.load.nominal.outtokens: "768"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qa-llama
  template:
    metadata:
      labels:
        app: qa-llama
    spec:
      containers:
      - name: server-sim
        image: quay.io/atantawi/inferno-server-sim:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: EVALUATOR_URL
          value: "http://localhost:8081"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      - name: evaluator
        image: quay.io/atantawi/inferno-evaluator:latest
        imagePullPolicy: IfNotPresent
        args: ["queue-analysis"]
        ports:
        - containerPort: 8081
        env:
        - name: MODEL_DATA_FILE
          value: "/app/config/model-data.json"
        - name: DEFAULT_MAX_QUEUE_SIZE
          value: "0"
        volumeMounts:
        - name: model-data
          mountPath: /app/config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: model-data
        configMap:
          name: server-sim-qa-small
