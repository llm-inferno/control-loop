  # hardware_config.json: GPU specs used by the blis roofline latency backend.
  # "gpu" in blis-config.json must match a key here.
  hardware_config.json: |
    {
      "H100": {
        "TFlopsPeak":  989.5,
        "TFlopsFP8":   1979.0,
        "BwPeakTBs":   3.35,
        "mfuPrefill":  0.45,
        "mfuDecode":   0.30,
        "MemoryGiB":   80.0
      },
      "A100-80": {
        "TFlopsPeak":  312,
        "TFlopsFP8":   0,
        "BwPeakTBs":   2.039,
        "mfuPrefill":  0.38,
        "mfuDecode":   0.18,
        "MemoryGiB":   80.0
      }
    }

  # HuggingFace model configs referenced by hfConfigPath above.
  granite-3.1-8b-instruct.json: |
    {
      "architectures": ["GraniteForCausalLM"],
      "attention_bias": false,
