        {
          "accelerator": "H100",
          "model": "mixtral_8_7b",
          "hfConfigPath": "/app/config/Mixtral-8x7B-v0.1.json",
          "gpu": "H100",
          "tp": 1,
          "totalKVBlocks": 16384,
          "blockSizeTokens": 16,
          "maxRunningReqs": 256,
          "maxScheduledTokens": 8192,
          "maxModelLen": 0,
          "scheduler": "fcfs",
          "betaCoeffs": [],
          "alphaCoeffs": [],
          "simulationHorizon": 60000000,
          "numRequests": 0,
          "seed": 42
        },
        {
          "accelerator": "A100",
          "model": "mixtral_8_7b",
          "hfConfigPath": "/app/config/Mixtral-8x7B-v0.1.json",
          "gpu": "A100-80",
