      "rope_theta": 10000000.0,
      "tie_word_embeddings": true,
      "torch_dtype": "bfloat16",
      "transformers_version": "4.47.0",
      "use_cache": true,
      "vocab_size": 49155
    }

  Llama-2-13b-hf.json: |
    {
      "architectures": ["LlamaForCausalLM"],
      "bos_token_id": 1,
      "eos_token_id": 2,
      "hidden_act": "silu",
