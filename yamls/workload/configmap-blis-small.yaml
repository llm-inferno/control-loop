apiVersion: v1
kind: ConfigMap
metadata:
  name: server-sim-blis-small
  namespace: infer
data:
  # blis-config.json: one entry per (model, accelerator) pair.
  # "model" must match the inferno.server.model deployment label.
  # "hfConfigPath" references a flat filename under the configmap mount (/app/config).
  blis-config.json: |
    {
      "models": [
        {
          "accelerator": "H100",
          "model": "granite_8b",
          "hfConfigPath": "/app/config/granite-3.1-8b-instruct.json",
          "gpu": "H100",
          "tp": 1,
          "totalKVBlocks": 23257,
          "blockSizeTokens": 16,
          "maxRunningReqs": 256,
          "maxScheduledTokens": 8192,
          "maxModelLen": 0,
          "scheduler": "fcfs",
          "betaCoeffs": [],
          "alphaCoeffs": [],
          "simulationHorizon": 60000000,
          "numRequests": 0,
          "seed": 42
        },
        {
          "accelerator": "A100",
          "model": "granite_8b",
          "hfConfigPath": "/app/config/granite-3.1-8b-instruct.json",
          "gpu": "A100-80",
          "tp": 1,
          "totalKVBlocks": 23257,
          "blockSizeTokens": 16,
          "maxRunningReqs": 256,
          "maxScheduledTokens": 8192,
          "maxModelLen": 0,
          "scheduler": "fcfs",
          "betaCoeffs": [],
          "alphaCoeffs": [],
          "simulationHorizon": 60000000,
          "numRequests": 0,
          "seed": 42
        },
        {
          "accelerator": "H100",
          "model": "llama_13b",
          "hfConfigPath": "/app/config/Llama-2-13b-hf.json",
          "gpu": "H100",
          "tp": 1,
          "totalKVBlocks": 14336,
          "blockSizeTokens": 16,
          "maxRunningReqs": 256,
          "maxScheduledTokens": 8192,
          "maxModelLen": 0,
          "scheduler": "fcfs",
          "betaCoeffs": [],
          "alphaCoeffs": [],
          "simulationHorizon": 60000000,
          "numRequests": 0,
          "seed": 42
        },
        {
          "accelerator": "A100",
          "model": "llama_13b",
          "hfConfigPath": "/app/config/Llama-2-13b-hf.json",
          "gpu": "A100-80",
          "tp": 1,
          "totalKVBlocks": 10240,
          "blockSizeTokens": 16,
          "maxRunningReqs": 256,
          "maxScheduledTokens": 8192,
