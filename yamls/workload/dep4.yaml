apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch2k-llama-13b
  namespace: infer
  labels:
    inferno.server.managed: "true"
    inferno.server.name: vllm-004
    inferno.server.model: llama_13b
    inferno.server.class: Batch2K
    inferno.server.allocation.accelerator: A100
    inferno.server.allocation.maxbatchsize: "16"
    inferno.server.load.rpm: "120"
    inferno.server.load.intokens: "2000"
    inferno.server.load.outtokens: "500"
    inferno.server.load.nominal.rpm: "120"
    inferno.server.load.nominal.intokens: "2000"
    inferno.server.load.nominal.outtokens: "500"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: vllm-004
  template:
    metadata:
      labels:
        app: vllm-004
    spec:
      containers:
      - name: server-sim
        image: quay.io/atantawi/inferno-server-sim:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: EVALUATOR_URL
          value: "http://localhost:8081"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      - name: evaluator
        image: quay.io/atantawi/inferno-evaluator:latest
        imagePullPolicy: IfNotPresent
        args: ["queue-analysis"]
        ports:
        - containerPort: 8081
        env:
        - name: MODEL_DATA_FILE
          value: "/etc/config/model-data.json"
        - name: DEFAULT_MAX_QUEUE_SIZE
          value: "0"
        volumeMounts:
        - name: model-data
          mountPath: /etc/config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: model-data
        configMap:
          name: server-sim-model-data
