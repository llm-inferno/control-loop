apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch2k-llama-13b
  namespace: infer
  labels:
    inferno.server.managed: "true"
    inferno.server.name: vllm-004
    inferno.server.model: llama_13b
    inferno.server.class: Batch2K
    inferno.server.allocation.accelerator: A100
    inferno.server.allocation.maxbatchsize: "16"
    inferno.server.load.rpm: "120"
    inferno.server.load.intokens: "2000"
    inferno.server.load.outtokens: "500"
    inferno.server.load.nominal.rpm: "120"
    inferno.server.load.nominal.intokens: "2000"
    inferno.server.load.nominal.outtokens: "500"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: example
  template:
    metadata:
      labels:
        app: example
    spec:
      containers:
      - name: main
        image: nginx
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
