apiVersion: v1
kind: ConfigMap
metadata:
  name: server-sim-blis-config
  namespace: infer
data:
  # blis-config.json: one entry per accelerator+model pair used by managed deployments.
  # "model" must match the inferno.server.model label value.
  # "hfConfigPath" references a flat filename under the configmap mount (/app/config).
  blis-config.json: |
    {
      "models": [
        {
          "accelerator": "H100",
          "model": "granite_13b",
          "hfConfigPath": "/app/config/granite-3.1-8b-instruct.json",
          "gpu": "H100",
          "tp": 1,
          "totalKVBlocks": 23257,
          "blockSizeTokens": 16,
          "maxRunningReqs": 256,
          "maxScheduledTokens": 8192,
          "maxModelLen": 0,
          "scheduler": "fcfs",
          "alphaCoeffs": [2247.789307383601, 4.366709277206167, 2026.846223138372],
          "simulationHorizon": 60000000,
          "numRequests": 0,
          "seed": 42
        }
      ]
    }

  # hardware_config.json: GPU hardware specs used by the blis latency backend.
  # "gpu" in blis-config.json must match a key here.
  hardware_config.json: |
    {
      "H100": {
        "TFlopsPeak":  989.5,
        "TFlopsFP8":   1979.0,
        "BwPeakTBs":   3.35,
        "mfuPrefill":  0.45,
        "mfuDecode":   0.30,
        "MemoryGiB":   80.0
      },
      "A100-80": {
        "TFlopsPeak":  312,
        "TFlopsFP8":   0,
        "BwPeakTBs":   2.039,
        "mfuPrefill":  0.38,
        "mfuDecode":   0.18,
        "MemoryGiB":   80.0
      }
    }

  # HuggingFace model config for granite-3.1-8b-instruct.
  # Referenced by hfConfigPath above as a flat filename under /app/config.
  granite-3.1-8b-instruct.json: |
    {
      "architectures": ["GraniteForCausalLM"],
      "attention_bias": false,
      "attention_dropout": 0.1,
      "attention_multiplier": 0.0078125,
      "bos_token_id": 0,
      "embedding_multiplier": 12.0,
      "eos_token_id": 0,
      "hidden_act": "silu",
      "hidden_size": 4096,
      "initializer_range": 0.02,
      "intermediate_size": 12800,
      "logits_scaling": 16.0,
      "max_position_embeddings": 131072,
      "mlp_bias": false,
      "model_type": "granite",
      "num_attention_heads": 32,
      "num_hidden_layers": 40,
      "num_key_value_heads": 8,
      "pad_token_id": 0,
      "residual_multiplier": 0.22,
      "rms_norm_eps": 1e-05,
      "rope_scaling": null,
      "rope_theta": 10000000.0,
      "tie_word_embeddings": true,
      "torch_dtype": "bfloat16",
      "transformers_version": "4.47.0",
      "use_cache": true,
      "vocab_size": 49155
    }
