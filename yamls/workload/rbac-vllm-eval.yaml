apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-server-evaluator
  namespace: infer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vllm-server-evaluator
  namespace: infer
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vllm-server-evaluator
  namespace: infer
subjects:
  - kind: ServiceAccount
    name: vllm-server-evaluator
    namespace: infer
roleRef:
  kind: Role
  name: vllm-server-evaluator
  apiGroup: rbac.authorization.k8s.io
