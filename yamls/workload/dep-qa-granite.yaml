apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-granite-8b
  namespace: infer
  labels:
    inferno.server.managed: "true"
    inferno.server.name: qa-granite
    inferno.server.model: granite_8b
    inferno.server.class: Premium
    inferno.server.allocation.accelerator: H100
    inferno.server.allocation.maxbatchsize: "64"
    inferno.server.allocation.maxqueuesize: "128"
    inferno.server.load.rpm: "60"
    inferno.server.load.intokens: "2048"
    inferno.server.load.outtokens: "1024"
    inferno.server.load.nominal.rpm: "60"
    inferno.server.load.nominal.intokens: "2048"
    inferno.server.load.nominal.outtokens: "1024"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: qa-granite
  template:
    metadata:
      labels:
        app: qa-granite
    spec:
      containers:
      - name: server-sim
        image: quay.io/atantawi/inferno-server-sim:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: EVALUATOR_URL
          value: "http://localhost:8081"
        - name: NOISE_ENABLED
          value: "true"
        - name: NOISE_STD_FRACTION
          value: "0.02"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      - name: evaluator
        image: quay.io/atantawi/inferno-evaluator:latest
        imagePullPolicy: IfNotPresent
        args: ["queue-analysis"]
        ports:
        - containerPort: 8081
        env:
        - name: MODEL_DATA_FILE
          value: "/app/config/model-data.json"
        - name: DEFAULT_MAX_QUEUE_SIZE
          value: "128"
        volumeMounts:
        - name: model-data
          mountPath: /app/config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: model-data
        configMap:
          name: server-sim-qa-small
